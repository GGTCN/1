<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Ultimate Cyber RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030308;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 頂部 HUD (血條、經驗條、Boss 血條) */
        .hud-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .bar-container {
            width: 160px;
            height: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            padding: 2px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.15s ease;
        }

        .hp-bar { background: linear-gradient(90deg, #ff3b30, #ff9500); width: 100%; }
        .exp-bar { background: linear-gradient(90deg, #00f0ff, #7000ff); width: 0%; }

        /* Boss 血條 (上方中央) */
        .boss-bar-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            max-width: 400px;
            height: 16px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,0,80,0.5);
            border-radius: 8px;
            display: none;
            z-index: 10;
            padding: 2px;
            box-shadow: 0 0 15px rgba(255,0,80,0.4);
        }

        .boss-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ff5000);
            border-radius: 6px;
            width: 100%;
        }

        /* 虛擬搖桿 */
        .joystick-zone {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joystick-knob {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.25);
            transition: transform 0.05s ease-out;
        }

        /* 右側技能控制按鈕組 */
        .action-group {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .btn-skill {
            border-radius: 50%;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
        }

        .btn-skill:active { transform: scale(0.88); }

        .btn-attack {
            width: 75px; height: 75px;
            background: rgba(255, 59, 48, 0.25);
            border: 1.5px solid rgba(255, 59, 48, 0.7);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.4);
        }

        .btn-dash {
            width: 55px; height: 55px;
            background: rgba(0, 240, 255, 0.2);
            border: 1.5px solid rgba(0, 240, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .btn-ult {
            width: 60px; height: 60px;
            background: rgba(112, 0, 255, 0.25);
            border: 1.5px solid rgba(112, 0, 255, 0.7);
            box-shadow: 0 0 18px rgba(112, 0, 255, 0.4);
        }

        .btn-skill svg { fill: #ffffff; }

        /* 三選一升級卡牌彈窗 (純圖示設計) */
        .level-up-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(3, 3, 8, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 100px; height: 140px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #00f0ff;
            box-shadow: 0 15px 35px rgba(0,240,255,0.3);
        }

        .card svg { width: 40px; height: 40px; stroke: #00f0ff; fill: none; stroke-width: 1.5; }

        /* 暗角特效 */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 5;
            background: radial-gradient(circle, transparent 60%, rgba(3, 3, 8, 0.9) 100%);
        }
    </style>
</head>
<body>

    <!-- HUD -->
    <div class="hud-overlay">
        <div class="bar-container"><div class="bar-fill hp-bar" id="hp-fill"></div></div>
        <div class="bar-container" style="width: 120px; height: 6px;"><div class="bar-fill exp-bar" id="exp-fill"></div></div>
    </div>

    <!-- Boss 血條 -->
    <div class="boss-bar-container" id="boss-bar-box">
        <div class="boss-bar-fill" id="boss-hp-fill"></div>
    </div>

    <canvas id="game-canvas"></canvas>
    <div class="vignette"></div>

    <!-- 搖桿 -->
    <div class="joystick-zone" id="joystick-base">
        <div class="joystick-knob" id="joystick-knob"></div>
    </div>

    <!-- 按鈕組 -->
    <div class="action-group">
        <button class="btn-skill btn-dash" id="btn-dash">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </button>
        <button class="btn-skill btn-ult" id="btn-ult">
            <svg width="28" height="28" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/><circle cx="12" cy="12" r="4"/></svg>
        </button>
        <button class="btn-skill btn-attack" id="btn-attack">
            <svg width="32" height="32" viewBox="0 0 24 24"><path d="M14.5 13.5L3 22v-3.5l11.5-8.5M21 3l-7.5 7.5 3 3L24 6l-3-3z"/></svg>
        </button>
    </div>

    <!-- 升級卡牌（無文字） -->
    <div class="level-up-overlay" id="level-overlay">
        <div class="card" onclick="upgrade('atk')">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div class="card" onclick="upgrade('spd')">
            <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="card" onclick="upgrade('hp')">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 核心 Scene & 畫面Shake系統 ---
        const canvas = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030308);
        scene.fog = new THREE.FogExp2(0x030308, 0.02);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        let screenShake = 0;

        // --- 數值與狀態 ---
        const playerStats = { hp: 100, maxHp: 100, exp: 0, maxExp: 100, atk: 35, speed: 0.14 };
        let isPaused = false;
        let killCount = 0;

        // --- 光影 ---
        scene.add(new THREE.AmbientLight(0x404060, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffb070, 1.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        const playerLight = new THREE.PointLight(0x00f0ff, 3, 12);
        scene.add(playerLight);

        // --- 擂台與環境 ---
        const floorGeo = new THREE.CylinderGeometry(32, 32, 2, 64);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0c0e17, roughness: 0.5, metalness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -1;
        scene.add(floor);

        // --- 主角建構 ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const bodyMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.5, 0.35, 1.4, 16),
            new THREE.MeshStandardMaterial({ color: 0x00f0ff, roughness: 0.2, metalness: 0.8 })
        );
        bodyMesh.position.y = 0.8;
        playerGroup.add(bodyMesh);

        const headMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        headMesh.position.set(0, 1.35, 0.25);
        playerGroup.add(headMesh);

        // 武器
        const swordGroup = new THREE.Group();
        const blade = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.02, 2.4, 8),
            new THREE.MeshBasicMaterial({ color: 0x00f0ff })
        );
        blade.position.y = 1.2;
        swordGroup.add(blade);
        swordGroup.position.set(0.65, 0.8, 0.2);
        swordGroup.rotation.x = Math.PI / 4;
        playerGroup.add(swordGroup);

        // --- 怪物與 Boss 系統 ---
        const enemies = [];
        const expOrbs = [];
        let boss = null;

        function spawnEnemy(isBoss = false) {
            const group = new THREE.Group();
            const angle = Math.random() * Math.PI * 2;
            const dist = isBoss ? 15 : 12 + Math.random() * 12;

            if (!isBoss) {
                const mesh = new THREE.Mesh(
                    new THREE.OctahedronGeometry(0.85),
                    new THREE.MeshStandardMaterial({ color: 0xff3b30, roughness: 0.3, emissive: 0x500000 })
                );
                mesh.position.y = 0.85;
                group.add(mesh);
                group.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
                scene.add(group);
                enemies.push({ group, mesh, hp: 80, maxHp: 80, speed: 0.04 + Math.random()*0.02, isBoss: false });
            } else {
                // Boss 登場
                const mesh = new THREE.Mesh(
                    new THREE.DodecahedronGeometry(2.2),
                    new THREE.MeshStandardMaterial({ color: 0xff0055, roughness: 0.1, emissive: 0x800020 })
                );
                mesh.position.y = 2.2;
                group.add(mesh);
                group.position.set(0, 0, -18);
                scene.add(group);
                boss = { group, mesh, hp: 1000, maxHp: 1000, speed: 0.035, isBoss: true };
                enemies.push(boss);
                document.getElementById('boss-bar-box').style.display = 'block';
            }
        }

        for(let i=0; i<5; i++) spawnEnemy();

        // 掉落經驗球
        function spawnExpOrb(pos) {
            const orb = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x00f0ff })
            );
            orb.position.copy(pos);
            orb.position.y = 0.5;
            scene.add(orb);
            expOrbs.push(orb);
        }

        // --- 操作（WASD + 搖桿） ---
        const keys = {};
        const joystick = { x: 0, y: 0, active: false };

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');

        const handleTouch = e => {
            const touch = e.touches[0];
            const rect = joyBase.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + rect.width/2);
            let dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 42) { dx = (dx/dist)*42; dy = (dy/dist)*42; }
            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.x = dx / 42; joystick.y = dy / 42;
        };

        joyBase.addEventListener('touchstart', e => { joystick.active = true; handleTouch(e); });
        window.addEventListener('touchmove', e => { if (joystick.active) handleTouch(e); });
        window.addEventListener('touchend', () => {
            joystick.active = false; joystick.x = 0; joystick.y = 0;
            joyKnob.style.transform = 'translate(0,0)';
        });

        // --- 技能系統 ---
        let isAttacking = false, attackTimer = 0;
        let isDashing = false, dashTimer = 0;

        // 普通攻擊
        function attack() {
            if (isAttacking || isPaused) return;
            isAttacking = true; attackTimer = 0;
            screenShake = 0.2;

            enemies.forEach((enemy, idx) => {
                if (playerGroup.position.distanceTo(enemy.group.position) < 4.2) {
                    enemy.hp -= playerStats.atk;
                    const knock = enemy.group.position.clone().sub(playerGroup.position).normalize().multiplyScalar(2.0);
                    enemy.group.position.add(knock);

                    if (enemy.hp <= 0) {
                        spawnExpOrb(enemy.group.position);
                        scene.remove(enemy.group);
                        enemies.splice(idx, 1);
                        killCount++;
                        if (killCount === 10) spawnEnemy(true); // 殺10隻召喚Boss
                        else setTimeout(() => spawnEnemy(false), 2000);
                    }
                }
            });
        }

        // 衝刺閃避 (Dash)
        function dash() {
            if (isDashing || isPaused) return;
            isDashing = true; dashTimer = 0.25;
        }

        // 大招 (Ultimate Shockwave)
        function ultimate() {
            if (isPaused) return;
            screenShake = 0.8;
            enemies.forEach((enemy, idx) => {
                enemy.hp -= playerStats.atk * 3;
                const knock = enemy.group.position.clone().sub(playerGroup.position).normalize().multiplyScalar(5.0);
                enemy.group.position.add(knock);
                if (enemy.hp <= 0) {
                    spawnExpOrb(enemy.group.position);
                    scene.remove(enemy.group);
                    enemies.splice(idx, 1);
                    setTimeout(() => spawnEnemy(false), 2000);
                }
            });
        }

        document.getElementById('btn-attack').addEventListener('click', attack);
        document.getElementById('btn-dash').addEventListener('click', dash);
        document.getElementById('btn-ult').addEventListener('click', ultimate);
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') attack();
            if (e.code === 'ShiftLeft') dash();
            if (e.code === 'KeyE') ultimate();
        });

        // --- 升級系統 ---
        function checkExp(amount) {
            playerStats.exp += amount;
            if (playerStats.exp >= playerStats.maxExp) {
                playerStats.exp = 0;
                playerStats.maxExp *= 1.3;
                isPaused = true;
                document.getElementById('level-overlay').style.display = 'flex';
            }
            document.getElementById('exp-fill').style.width = `${(playerStats.exp/playerStats.maxExp)*100}%`;
        }

        window.upgrade = function(type) {
            if (type === 'atk') playerStats.atk += 20;
            if (type === 'spd') playerStats.speed += 0.04;
            if (type === 'hp') { playerStats.maxHp += 30; playerStats.hp = playerStats.maxHp; }
            document.getElementById('level-overlay').style.display = 'none';
            isPaused = false;
        };

        // --- 遊戲迴圈 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) return;

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. 移動與衝刺算式
            let mx = 0, mz = 0;
            if (keys['w']||keys['arrowup']) mz -= 1;
            if (keys['s']||keys['arrowdown']) mz += 1;
            if (keys['a']||keys['arrowleft']) mx -= 1;
            if (keys['d']||keys['arrowright']) mx += 1;
            if (joystick.active) { mx = joystick.x; mz = joystick.y; }

            const moveVec = new THREE.Vector3(mx, 0, mz);
            let speed = playerStats.speed;

            if (isDashing) {
                dashTimer -= delta;
                speed *= 3.0; // 衝刺加速
                if (dashTimer <= 0) isDashing = false;
            }

            if (moveVec.length() > 0.1) {
                moveVec.normalize().multiplyScalar(speed);
                playerGroup.position.add(moveVec);
                if (playerGroup.position.length() > 30) playerGroup.position.setLength(30);
                playerGroup.rotation.y += (Math.atan2(moveVec.x, moveVec.z) - playerGroup.rotation.y) * 0.25;
            }

            playerLight.position.copy(playerGroup.position).add(new THREE.Vector3(0, 2, 0));

            // 2. 揮劍動作
            if (isAttacking) {
                attackTimer += delta * 15;
                swordGroup.rotation.z = -Math.sin(attackTimer) * 2.5;
                if (attackTimer >= Math.PI) {
                    isAttacking = false;
                    swordGroup.rotation.set(Math.PI / 4, 0, 0);
                }
            }

            // 3. 怪物 AI 與 Boss 邏輯
            enemies.forEach(enemy => {
                enemy.mesh.rotation.x += 0.02;
                enemy.mesh.rotation.y += 0.03;
                const dir = playerGroup.position.clone().sub(enemy.group.position).normalize();
                enemy.group.position.add(dir.multiplyScalar(enemy.speed));

                // 傷害玩家
                if (playerGroup.position.distanceTo(enemy.group.position) < 1.2 && !isDashing) {
                    playerStats.hp -= 0.3;
                    document.getElementById('hp-fill').style.width = `${Math.max(0, playerStats.hp)}%`;
                }
            });

            // Boss 血條更新
            if (boss) {
                document.getElementById('boss-hp-fill').style.width = `${(boss.hp / boss.maxHp) * 100}%`;
            }

            // 4. 經驗球吸附
            expOrbs.forEach((orb, idx) => {
                if (playerGroup.position.distanceTo(orb.position) < 5.0) {
                    orb.position.lerp(playerGroup.position, 0.15);
                    if (playerGroup.position.distanceTo(orb.position) < 1.0) {
                        scene.remove(orb);
                        expOrbs.splice(idx, 1);
                        checkExp(35);
                    }
                }
            });

            // 5. 畫面震動 (Screen Shake)
            if (screenShake > 0) {
                camera.position.x += (Math.random() - 0.5) * screenShake;
                camera.position.y += (Math.random() - 0.5) * screenShake;
                screenShake *= 0.85;
            }

            // 鏡頭跟隨
            const camTarget = playerGroup.position.clone().add(new THREE.Vector3(0, 16, 20));
            camera.position.lerp(camTarget, 0.08);
            camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(0, 1, 0)));

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
