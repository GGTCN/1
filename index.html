<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Cyberpunk RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* HUD 狀態血條 (無文字極簡設計) */
        .hud-overlay {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .bar-container {
            width: 140px;
            height: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            padding: 2px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.2s ease;
        }

        .hp-bar { background: linear-gradient(90deg, #ff3b30, #ff9500); width: 100%; }
        .exp-bar { background: linear-gradient(90deg, #00f0ff, #7000ff); width: 45%; }

        /* 虛擬搖桿 (Joystick) */
        .joystick-zone {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joystick-knob {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.25);
            transition: transform 0.05s ease-out;
        }

        /* 攻擊技能按鈕 */
        .btn-attack {
            position: fixed;
            bottom: 45px;
            right: 40px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(255, 59, 48, 0.2);
            border: 1.5px solid rgba(255, 59, 48, 0.6);
            backdrop-filter: blur(10px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
            cursor: pointer;
        }

        .btn-attack:active {
            transform: scale(0.9);
            background: rgba(255, 59, 48, 0.5);
        }

        .btn-attack svg {
            width: 32px;
            height: 32px;
            fill: #ffffff;
        }

        /* 劇院級暗角 */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(circle, transparent 60%, rgba(5, 5, 8, 0.85) 100%);
        }
    </style>
</head>
<body>

    <!-- HUD 血條與經驗條 -->
    <div class="hud-overlay">
        <div class="bar-container"><div class="bar-fill hp-bar" id="hp-fill"></div></div>
        <div class="bar-container" style="width: 100px; height: 6px;"><div class="bar-fill exp-bar" id="exp-fill"></div></div>
    </div>

    <!-- 遊戲 Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- 暗角 -->
    <div class="vignette"></div>

    <!-- 觸控控制（虛擬搖桿與攻擊） -->
    <div class="joystick-zone" id="joystick-base">
        <div class="joystick-knob" id="joystick-knob"></div>
    </div>

    <button class="btn-attack" id="btn-attack">
        <svg viewBox="0 0 24 24"><path d="M14.5 13.5L3 22v-3.5l11.5-8.5M21 3l-7.5 7.5 3 3L24 6l-3-3zM3 2l8.5 11.5L8 15 2 3.5V2h1z"/></svg>
    </button>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. Scene & 鏡頭系統 ---
        const canvas = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x06060c);
        scene.fog = new THREE.FogExp2(0x06060c, 0.02);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;

        // --- 2. 光影設定 (賽博霓光) ---
        const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffb070, 1.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // 玩家發光點光源
        const playerLight = new THREE.PointLight(0x00f0ff, 3, 12);
        scene.add(playerLight);

        // --- 3. 浮空科幻擂台 (Stage) ---
        const floorGeo = new THREE.CylinderGeometry(28, 28, 2, 64);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x10121b, roughness: 0.6, metalness: 0.4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -1;
        floor.receiveShadow = true;
        scene.add(floor);

        // 外圍光環
        const ringGeo = new THREE.RingGeometry(27.5, 28, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.02;
        scene.add(ring);

        // 浮空水晶環境柱
        for(let i = 0; i < 12; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 12 + Math.random() * 13;
            const crystalGeo = new THREE.ConeGeometry(1.2, 4, 5);
            const crystalMat = new THREE.MeshStandardMaterial({ color: 0x7000ff, roughness: 0.2, emissive: 0x200050 });
            const crystal = new THREE.Mesh(crystalGeo, crystalMat);
            crystal.position.set(Math.cos(angle) * dist, 2, Math.sin(angle) * dist);
            crystal.rotation.x = (Math.random() - 0.5) * 0.4;
            crystal.rotation.z = (Math.random() - 0.5) * 0.4;
            crystal.castShadow = true;
            scene.add(crystal);
        }

        // --- 4. 玩家角色 (Player) ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // 身體
        const bodyGeo = new THREE.CylinderGeometry(0.55, 0.4, 1.5, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00f0ff, roughness: 0.2, metalness: 0.6 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.9;
        body.castShadow = true;
        playerGroup.add(body);

        // 頭部 (發光面具)
        const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
        const headMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0, 1.4, 0.25);
        playerGroup.add(head);

        // 武器: 霓光長劍
        const swordGroup = new THREE.Group();
        const bladeGeo = new THREE.CylinderGeometry(0.06, 0.02, 2.2, 8);
        const bladeMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff });
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.position.y = 1.1;
        swordGroup.add(blade);
        swordGroup.position.set(0.65, 0.9, 0.2);
        swordGroup.rotation.x = Math.PI / 4;
        playerGroup.add(swordGroup);

        // --- 5. 敵人生成系統 (Enemies) ---
        const enemies = [];
        function spawnEnemy() {
            if (enemies.length >= 6) return;
            const enemyGroup = new THREE.Group();
            const angle = Math.random() * Math.PI * 2;
            const dist = 12 + Math.random() * 10;

            const eGeo = new THREE.OctahedronGeometry(0.85);
            const eMat = new THREE.MeshStandardMaterial({ color: 0xff3b30, roughness: 0.3, emissive: 0x600000 });
            const eMesh = new THREE.Mesh(eGeo, eMat);
            eMesh.position.y = 0.9;
            eMesh.castShadow = true;
            enemyGroup.add(eMesh);

            // 敵人群區域光
            const eLight = new THREE.PointLight(0xff3b30, 1, 5);
            eLight.position.y = 0.9;
            enemyGroup.add(eLight);

            enemyGroup.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
            scene.add(enemyGroup);
            enemies.push({ group: enemyGroup, mesh: eMesh, hp: 100, speed: 0.045 + Math.random() * 0.02 });
        }

        for(let i = 0; i < 4; i++) spawnEnemy();

        // --- 6. 操控系統 (WASD + 手機虛擬搖桿) ---
        const keys = {};
        const joystick = { x: 0, y: 0, active: false };

        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 搖桿事件
        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');

        const handleTouchMove = (e) => {
            const touch = e.touches[0];
            const rect = joyBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = 42;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.x = dx / maxDist;
            joystick.y = dy / maxDist;
        };

        joyBase.addEventListener('touchstart', (e) => { joystick.active = true; handleTouchMove(e); });
        window.addEventListener('touchmove', (e) => { if (joystick.active) handleTouchMove(e); });
        window.addEventListener('touchend', () => {
            joystick.active = false;
            joystick.x = 0; joystick.y = 0;
            joyKnob.style.transform = 'translate(0px, 0px)';
        });

        // 攻擊動作
        let isAttacking = false;
        let attackTimer = 0;
        const attackBtn = document.getElementById('btn-attack');

        function triggerAttack() {
            if (isAttacking) return;
            isAttacking = true;
            attackTimer = 0;

            // 揮劍近戰打擊檢測
            enemies.forEach((enemy, idx) => {
                const dist = playerGroup.position.distanceTo(enemy.group.position);
                if (dist < 3.8) {
                    enemy.hp -= 50;
                    // 被擊退（Knockback）
                    const knockback = enemy.group.position.clone().sub(playerGroup.position).normalize().multiplyScalar(1.6);
                    enemy.group.position.add(knockback);

                    if (enemy.hp <= 0) {
                        scene.remove(enemy.group);
                        enemies.splice(idx, 1);
                        setTimeout(spawnEnemy, 2500);
                    }
                }
            });
        }

        attackBtn.addEventListener('click', triggerAttack);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') triggerAttack(); });

        // --- 7. 遊戲主迴圈 (Loop) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. 移動控制計算
            let moveX = 0;
            let moveZ = 0;

            if (keys['w'] || keys['arrowup']) moveZ -= 1;
            if (keys['s'] || keys['arrowdown']) moveZ += 1;
            if (keys['a'] || keys['arrowleft']) moveX -= 1;
            if (keys['d'] || keys['arrowright']) moveX += 1;

            if (joystick.active) {
                moveX = joystick.x;
                moveZ = joystick.y;
            }

            const moveVec = new THREE.Vector3(moveX, 0, moveZ);
            if (moveVec.length() > 0.1) {
                moveVec.normalize().multiplyScalar(0.13);
                playerGroup.position.add(moveVec);

                // 地圖邊界限制
                if (playerGroup.position.length() > 26) playerGroup.position.setLength(26);

                // 角轉向
                const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                playerGroup.rotation.y += (targetAngle - playerGroup.rotation.y) * 0.2;

                // 跑步律動
                body.position.y = 0.9 + Math.sin(time * 14) * 0.08;
            } else {
                body.position.y = 0.9 + Math.sin(time * 3) * 0.03; // 待機浮動
            }

            // 更新玩家燈光位置
            playerLight.position.copy(playerGroup.position).add(new THREE.Vector3(0, 2, 0));

            // 2. 揮劍攻擊動畫
            if (isAttacking) {
                attackTimer += delta * 12;
                swordGroup.rotation.z = -Math.sin(attackTimer) * 2.2;
                swordGroup.rotation.y = Math.cos(attackTimer) * 1.5;
                if (attackTimer >= Math.PI) {
                    isAttacking = false;
                    swordGroup.rotation.set(Math.PI / 4, 0, 0);
                }
            }

            // 3. 怪物 AI (追蹤 + 自轉)
            enemies.forEach(enemy => {
                enemy.mesh.rotation.x += 0.02;
                enemy.mesh.rotation.y += 0.03;

                const dir = playerGroup.position.clone().sub(enemy.group.position).normalize();
                enemy.group.position.add(dir.multiplyScalar(enemy.speed));

                // 浮動震盪
                enemy.mesh.position.y = 0.9 + Math.sin(time * 4 + enemy.group.position.x) * 0.2;
            });

            // 4. 追蹤攝影機 (Follow Camera)
            const camTargetPos = playerGroup.position.clone().add(new THREE.Vector3(0, 15, 18));
            camera.position.lerp(camTargetPos, 0.08);
            camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(0, 1, 0)));

            renderer.render(scene, camera);
        }

        animate();

        // RWD 自適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
